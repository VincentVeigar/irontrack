<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scheda Allenamento</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #1f1f28;
    --border: #2a2a38;
    --accent: #c8f135;
    --accent2: #f1a035;
    --accent3: #35c8f1;
    --text: #e8e8f0;
    --muted: #7878a0;
    --danger: #f13560;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .streak {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
  }

  /* WEEK TABS */
  .week-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .week-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all .2s;
    letter-spacing: .5px;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .tab.done {
    border-color: var(--accent);
    color: var(--accent);
  }
  .tab.rest {
    border-color: var(--border);
    color: var(--muted);
    font-style: italic;
  }

  /* CONTENT */
  .content { padding: 16px 16px 0; }

  /* DAY HEADER */
  .day-header {
    margin-bottom: 16px;
  }
  .day-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .day-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SECTION */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* EXERCISE CARD */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .ex-card.completed { border-color: var(--accent); }

  .ex-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
    cursor: pointer;
  }
  .ex-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    font-size: 11px;
  }
  .ex-card.completed .ex-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ex-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .ex-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .ex-expand {
    font-size: 18px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform .2s;
  }
  .ex-card.open .ex-expand { transform: rotate(180deg); }

  /* SETS */
  .ex-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .ex-card.open .ex-body { display: block; }

  .ex-note {
    font-size: 12px;
    color: var(--accent3);
    padding: 8px 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sets-header {
    display: grid;
    grid-template-columns: 32px 1fr 1fr 1fr 32px;
    gap: 6px;
    padding: 6px 0 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .sets-header > * { text-align: center; }
  .sets-header > *:first-child { text-align: center; }

  .set-row {
    display: grid;
    grid-template-columns: 32px 1fr 1fr 1fr 32px;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .set-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }
  .set-row.done-set .set-num {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 6px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    width: 100%;
    outline: none;
    transition: border-color .2s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-input.target {
    background: transparent;
    border-color: transparent;
    color: var(--muted);
    font-weight: 400;
    font-size: 13px;
  }
  .set-done-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .set-row.done-set .set-done-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* REST TIMER */
  .rest-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 10px;
    font-size: 13px;
  }
  .rest-bar.active { display: flex; }
  .rest-timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    min-width: 50px;
  }
  .rest-label { flex: 1; color: var(--muted); font-size: 12px; }
  .rest-skip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* CARDIO */
  .cardio-card {
    background: linear-gradient(135deg, #1a1a26 0%, #1f2030 100%);
    border: 1px solid var(--accent2);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .cardio-icon {
    font-size: 28px;
    width: 48px;
    height: 48px;
    background: var(--surface2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cardio-info { flex: 1; }
  .cardio-type { font-size: 13px; font-weight: 700; color: var(--accent2); }
  .cardio-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cardio-done-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    transition: all .2s;
  }
  .cardio-done-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-text {
    font-size: 12px;
    color: var(--muted);
    min-width: 35px;
    text-align: right;
  }

  /* REST DAY */
  .rest-day {
    text-align: center;
    padding: 60px 20px;
  }
  .rest-day .emoji { font-size: 64px; margin-bottom: 16px; }
  .rest-day h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .rest-day p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn span:first-child { font-size: 20px; }

  /* STATS VIEW */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .week-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .week-chart h3 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 80px;
  }
  .chart-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
    gap: 4px;
  }
  .chart-bar {
    width: 100%;
    background: var(--border);
    border-radius: 4px 4px 0 0;
    transition: height .4s ease;
    min-height: 4px;
  }
  .chart-bar.filled { background: var(--accent); }
  .chart-day-label { font-size: 10px; color: var(--muted); font-weight: 600; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .hidden { display: none !important; }
</style>
</head>

          { name: "Leg curl", sets: 3, reps: "15", rest: 60, note: "Femorali e parte bassa glutei" },
        ]
      },
      {
        label: "UPPER BODY (RINFORZO)",
        exercises: [
          { name: "Lat machine presa stretta", sets: 3, reps: "12", rest: 75, note: "Dorsali — volume aggiuntivo" },
          { name: "Shoulder press macchina", sets: 3, reps: "12", rest: 75, note: "Spalle — carico leggero, focus contrazione" },
        ]
      }
    ],
    cardio: { type: "LISS", icon: "🚴", duration: "25 min", desc: "Cyclette o tapis roulant · brucia grassi" }
  },
  {
    day: "DOM",
    name: "RIPOSO COMPLETO",
    rest: true,
    color: "#7878a0",
    restMessage: "Il muscolo cresce nel riposo",
    restTips: ["Sonno 7–9 ore", "Pasto ricco di proteine", "Stretching leggero facoltativo", "Mentale fresco per la settimana"]
  }
];

// ─── STATE ───────────────────────────────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz9nvv5uQGjkSiYd7JU9fYn7T1sTLm0MlS7r9SGfJO3mtLtHTZVxRbCVfctVOCMbxDAlw/exec';

let state = {};
let saveTimeout = null;

function setSyncStatus(status) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  const map = {
    loading: ['☁️', '#7878a0', 'Caricamento...'],
    saving:  ['🔄', '#f1a035', 'Salvataggio...'],
    saved:   ['✓', '#c8f135', 'Sincronizzato'],
    error:   ['⚠️', '#f13560', 'Solo locale'],
  };
  const [icon, color, label] = map[status] || map.error;
  el.innerHTML = icon + ' <span style="color:' + color + '">' + label + '</span>';
}

async function loadState() {
  setSyncStatus('loading');
  // Carica subito da localStorage per risposta immediata
  try { state = JSON.parse(localStorage.getItem('irontrack_v2') || '{}'); } catch {}
  // Poi sincronizza dal cloud con fetch CORS
  try {
    const res = await fetch(SHEETS_URL, { method: 'GET' });
    const text = await res.text();
    const parsed = JSON.parse(text || '{}');
    if (parsed && typeof parsed === 'object' && Object.keys(parsed).length > 0) {
      state = parsed;
      localStorage.setItem('irontrack_v2', JSON.stringify(state));
    }
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus(Object.keys(state).length > 0 ? 'saved' : 'error');
  }
}

async function saveState() {
  // Salva subito in localStorage
  try { localStorage.setItem('irontrack_v2', JSON.stringify(state)); } catch {}
  // Debounce il salvataggio cloud
  if (saveTimeout) clearTimeout(saveTimeout);
  setSyncStatus('saving');
  saveTimeout = setTimeout(async () => {
    try {
      const res = await fetch(SHEETS_URL, {
        method: 'POST',
        body: JSON.stringify(state)
      });
      if (res.ok || res.type === 'opaque') setSyncStatus('saved');
      else setSyncStatus('error');
    } catch(e) {
      setSyncStatus('error');
    }
  }, 1500);
}
let currentDay = new Date().getDay(); // 0=dom
// map to our 0=lun index
const jsToIdx = [6,0,1,2,3,4,5];
let activeDay = jsToIdx[currentDay];
let currentView = 'workout';
let restTimerInterval = null;

function getKey(dayIdx, exIdx, setIdx, field) {
  return `d${dayIdx}_e${exIdx}_s${setIdx}_${field}`;
}
function getDayKey(dayIdx) { return `day_done_${dayIdx}`; }
function getCardioKey(dayIdx) { return `cardio_done_${dayIdx}`; }
function getWeekKey() {
  const d = new Date();
  return `week_${d.getFullYear()}_${Math.ceil((d - new Date(d.getFullYear(),0,1))/(7*86400000))}`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  renderTabs();
  if (currentView === 'workout') renderWorkout();
  else if (currentView === 'stats') renderStats();
  else renderNotes();
  updateStreak();
}

function renderTabs() {
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = SCHEDULE.map((d, i) => {
    const isDone = state[getDayKey(i)];
    const cls = i === activeDay ? 'tab active' : isDone ? 'tab done' : d.rest ? 'tab rest' : 'tab';
    return `<button class="${cls}" onclick="switchDay(${i})">${d.day}</button>`;
  }).join('');
}

function renderWorkout() {
  const d = SCHEDULE[activeDay];
  const content = document.getElementById('mainContent');

  if (d.rest) {
    content.innerHTML = `
      <div class="rest-day">
        <div class="emoji">${d.name.includes('ATTIVO') ? '🧘' : '😴'}</div>
        <h2 style="color:${d.color}">${d.name}</h2>
        <p style="margin-bottom:20px">${d.restMessage}</p>
        ${d.restTips.map(t => `<p style="color:var(--muted);font-size:13px;margin:4px 0">✓ ${t}</p>`).join('')}
      </div>`;
    return;
  }

  // Progress
  const totalEx = d.sections.reduce((a, s) => a + s.exercises.length, 0);
  const doneEx = d.sections.reduce((a, s, si) => {
    return a + s.exercises.filter((_, ei) => {
      const absIdx = d.sections.slice(0, si).reduce((x, sec) => x + sec.exercises.length, 0) + ei;
      return state[`ex_done_${activeDay}_${absIdx}`];
    }).length;
  }, 0);
  const pct = Math.round(doneEx / totalEx * 100);

  let html = `
    <div class="day-header">
      <div class="day-tag" style="background:${d.color}22;color:${d.color}">${d.tag}</div>
      <div class="day-title" style="color:${d.color}">${d.name}</div>
      <div class="day-subtitle">${d.subtitle}</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${d.color}"></div></div>
        <div class="progress-text">${doneEx}/${totalEx}</div>
      </div>
    </div>`;

  let absIdx = 0;
  d.sections.forEach((sec, si) => {
    html += `<div class="section-label">${sec.label}</div>`;
    sec.exercises.forEach((ex, ei) => {
      const idx = absIdx;
      const isDone = state[`ex_done_${activeDay}_${idx}`];
      const isOpen = state[`ex_open_${activeDay}_${idx}`];
      html += renderExCard(ex, activeDay, idx, isDone, isOpen, d.color);
      absIdx++;
    });
  });

  // Cardio
  if (d.cardio) {
    const cardioDone = state[getCardioKey(activeDay)];
    html += `
      <div class="section-label">CARDIO</div>
      <div class="cardio-card">
        <div class="cardio-icon">${d.cardio.icon}</div>
        <div class="cardio-info">
          <div class="cardio-type">${d.cardio.type} · ${d.cardio.duration}</div>
          <div class="cardio-desc">${d.cardio.desc}</div>
        </div>
        <button class="cardio-done-btn ${cardioDone ? 'active' : ''}" onclick="toggleCardio(${activeDay})">
          ${cardioDone ? '✓ Fatto' : 'Fine'}
        </button>
      </div>`;
  }

  content.innerHTML = html;
}

function renderExCard(ex, dayIdx, idx, isDone, isOpen, color) {
  let setsHtml = '';
  for (let s = 0; s < ex.sets; s++) {
    const wKey = getKey(dayIdx, idx, s, 'w');
    const rKey = getKey(dayIdx, idx, s, 'r');
    const dKey = getKey(dayIdx, idx, s, 'd');
    const w = state[wKey] || '';
    const r = state[rKey] || '';
    const done = state[dKey];
    setsHtml += `
      <div class="set-row ${done ? 'done-set' : ''}" id="setrow_${dayIdx}_${idx}_${s}">
        <div class="set-num">${s+1}</div>
        <input class="set-input target" value="${ex.reps}" readonly>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
          value="${w}" onchange="saveSet(${dayIdx},${idx},${s},'w',this.value)"
          onfocus="this.select()" style="border-color:${done?color:'var(--border)'}">
        <input class="set-input" type="number" inputmode="numeric" placeholder="rip"
          value="${r}" onchange="saveSet(${dayIdx},${idx},${s},'r',this.value)"
          onfocus="this.select()" style="border-color:${done?color:'var(--border)'}">
        <button class="set-done-btn" onclick="toggleSet(${dayIdx},${idx},${s},${ex.rest},'${color}')" 
          style="${done?`background:${color};border-color:${color};color:#000`:''}">
          ${done ? '✓' : '○'}
        </button>
      </div>`;
  }

  return `
    <div class="ex-card ${isDone ? 'completed' : ''} ${isOpen ? 'open' : ''}" id="ex_${dayIdx}_${idx}">
      <div class="ex-header" onclick="toggleExCard(${dayIdx},${idx})">
        <div class="ex-check" style="${isDone ? `background:${color};border-color:${color};color:#000` : ''}">
          ${isDone ? '✓' : ''}
        </div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.sets} serie · ${ex.reps} rip · recupero ${ex.rest}s</div>
        </div>
        <div class="ex-expand">⌄</div>
      </div>
      <div class="ex-body">
        <div class="ex-note">💡 ${ex.note}</div>
        <div class="sets-header">
          <div>#</div><div>TARGET</div><div>KG</div><div>RIP</div><div>✓</div>
        </div>
        ${setsHtml}
        <div class="rest-bar" id="rest_${dayIdx}_${idx}">
          <div class="rest-timer" id="timer_${dayIdx}_${idx}">0:${String(ex.rest).padStart(2,'0')}</div>
          <div class="rest-label">⏱ Recupero in corso...</div>
          <button class="rest-skip" onclick="skipRest(${dayIdx},${idx})">Salta</button>
        </div>
      </div>
    </div>`;
}

function renderStats() {
  const wk = getWeekKey();
  let totalSessions = 0;
  let totalSets = 0;
  for (let i = 0; i < 7; i++) {
    if (state[getDayKey(i)]) totalSessions++;
  }
  // Count sets done this week
  Object.keys(state).forEach(k => { if (k.includes('_d') && k.endsWith('_d') && state[k]) totalSets++; });

  const days = ['L','M','M','G','V','S','D'];
  const bars = SCHEDULE.map((d, i) => {
    const done = state[getDayKey(i)];
    return `<div class="chart-col">
      <div class="chart-bar ${done ? 'filled' : ''}" style="height:${done ? '100%' : '20%'}"></div>
      <div class="chart-day-label" style="color:${i===activeDay?d.color:'var(--muted)'}">${days[i]}</div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div style="padding-top:4px">
      <div class="section-label">QUESTA SETTIMANA</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${totalSessions}</div>
          <div class="stat-label">sessioni completate</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${5 - Math.min(totalSessions,5)}</div>
          <div class="stat-label">sessioni rimanenti</div>
        </div>
      </div>
      <div class="week-chart">
        <h3>ALLENAMENTI SETTIMANA</h3>
        <div class="chart-bars">${bars}</div>
      </div>
      <div class="section-label">GRUPPI MUSCOLARI</div>
      ${['Spalle','Glutei & Fianchi','Gambe','Addome & Core','Schiena','Petto'].map((m,i) => `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
          <div style="font-size:18px">${['🏋️','🍑','🦵','💪','🔙','💛'][i]}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${m}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${['2x/settimana','2x/settimana','2x/settimana','2x/settimana','2x/settimana','1x/settimana'][i]}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderNotes() {
  const notes = state['user_notes'] || '';
  document.getElementById('mainContent').innerHTML = `
    <div style="padding-top:4px">
      <div class="section-label">LE MIE NOTE</div>
      <textarea 
        style="width:100%;min-height:200px;background:var(--surface);border:1px solid var(--border);border-radius:12px;
               padding:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:vertical;outline:none;line-height:1.6"
        placeholder="Scrivi qui i tuoi progressi, sensazioni, note sui pesi..."
        oninput="state['user_notes']=this.value;saveState()">${notes}</textarea>
      <div class="section-label" style="margin-top:16px">CONSIGLI SOVRACCARICO PROGRESSIVO</div>
      ${[
        ['📈 Regola +2.5kg', 'Quando completi tutte le serie nel range ALTO per 2 sessioni consecutive, aumenta il peso di 2.5 kg.'],
        ['📊 Regola del doppio', 'Se non riesci a completare il range basso, scendi del 10%. Mai sacrificare la forma per il peso.'],
        ['🎯 Spalle', 'Aumenta prima le alzate laterali (isolamento), poi il lento avanti (compound).'],
        ['🍑 Glutei', 'L\'hip thrust risponde bene a carichi elevati. Priorità assoluta su questo esercizio.'],
      ].map(([t,d]) => `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px">
          <div style="font-size:13px;font-weight:700;margin-bottom:4px">${t}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5">${d}</div>
        </div>`).join('')}
    </div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function switchDay(idx) {
  activeDay = idx;
  if (currentView !== 'workout') { currentView = 'workout'; updateNavBtns(); }
  render();
}

function switchView(view) {
  currentView = view;
  updateNavBtns();
  render();
}

function updateNavBtns() {
  ['workout','stats','notes'].forEach(v => {
    document.getElementById('nav'+v.charAt(0).toUpperCase()+v.slice(1))?.classList.toggle('active', v===currentView);
  });
}

function toggleExCard(dayIdx, idx) {
  const key = `ex_open_${dayIdx}_${idx}`;
  state[key] = !state[key];
  saveState();
  renderWorkout();
}

function saveSet(dayIdx, exIdx, setIdx, field, val) {
  state[getKey(dayIdx, exIdx, setIdx, field)] = val;
  saveState();
}

function toggleSet(dayIdx, exIdx, setIdx, restSec, color) {
  const dKey = getKey(dayIdx, exIdx, setIdx, 'd');
  state[dKey] = !state[dKey];
  saveState();

  // Check if all sets done
  const ex = getExByIdx(dayIdx, exIdx);
  if (ex) {
    const allDone = Array.from({length: ex.sets}, (_, s) => state[getKey(dayIdx, exIdx, s, 'd')]).every(Boolean);
    state[`ex_done_${dayIdx}_${exIdx}`] = allDone;
    saveState();
  }

  // Start rest timer
  if (state[dKey] && restSec) {
    startRest(dayIdx, exIdx, restSec);
  } else {
    stopRest(dayIdx, exIdx);
  }

  renderWorkout();
}

function getExByIdx(dayIdx, exIdx) {
  const d = SCHEDULE[dayIdx];
  if (!d || d.rest) return null;
  let i = 0;
  for (const sec of d.sections) {
    for (const ex of sec.exercises) {
      if (i === exIdx) return ex;
      i++;
    }
  }
  return null;
}

function startRest(dayIdx, exIdx, sec) {
  if (restTimerInterval) clearInterval(restTimerInterval);
  let remaining = sec;
  const bar = document.getElementById(`rest_${dayIdx}_${exIdx}`);
  const timer = document.getElementById(`timer_${dayIdx}_${exIdx}`);
  if (!bar || !timer) return;
  bar.classList.add('active');

  function tick() {
    if (!document.getElementById(`rest_${dayIdx}_${exIdx}`)) { clearInterval(restTimerInterval); return; }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    document.getElementById(`timer_${dayIdx}_${exIdx}`).textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (remaining <= 0) {
      clearInterval(restTimerInterval);
      document.getElementById(`rest_${dayIdx}_${exIdx}`)?.classList.remove('active');
    }
    remaining--;
  }
  tick();
  restTimerInterval = setInterval(tick, 1000);
}

function stopRest(dayIdx, exIdx) {
  if (restTimerInterval) clearInterval(restTimerInterval);
  document.getElementById(`rest_${dayIdx}_${exIdx}`)?.classList.remove('active');
}

function skipRest(dayIdx, exIdx) {
  stopRest(dayIdx, exIdx);
}

function toggleCardio(dayIdx) {
  const key = getCardioKey(dayIdx);
  state[key] = !state[key];
  checkDayComplete(dayIdx);
  saveState();
  renderWorkout();
}

function checkDayComplete(dayIdx) {
  const d = SCHEDULE[dayIdx];
  if (!d || d.rest) return;
  let total = 0, done = 0;
  d.sections.forEach(sec => { sec.exercises.forEach((_, i) => { total++; }); });
  let idx = 0;
  d.sections.forEach(sec => {
    sec.exercises.forEach(() => {
      if (state[`ex_done_${dayIdx}_${idx}`]) done++;
      idx++;
    });
  });
  const cardioDone = d.cardio ? state[getCardioKey(dayIdx)] : true;
  state[getDayKey(dayIdx)] = done === total && cardioDone;
}

function updateStreak() {
  let streak = 0;
  for (let i = activeDay; i >= 0; i--) {
    if (SCHEDULE[i].rest || state[getDayKey(i)]) streak++;
    else break;
  }
  document.getElementById('streakCount').textContent = streak;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadState();
  render();
}
init();
</script>
